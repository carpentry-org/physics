name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Run tests
        run: |
          set -euo pipefail
          carp -x tests/basics.carp
          carp -x tests/electromagnetic.carp
          carp -x tests/energy.carp
          carp -x tests/fields.carp
          carp -x tests/mechanics.carp
          carp -x tests/quantum.carp
          carp -x tests/thermal.carp
          carp -x tests/wave.carp

      - name: Install angler
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/carpentry-org/angler /tmp/angler
          (cd /tmp/angler && carp -b main.carp)
          sudo install -m 755 /tmp/angler/out/angler /usr/local/bin/

      - name: Install carp-fmt
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/carpentry-org/carp-fmt /tmp/carp-fmt
          (cd /tmp/carp-fmt && carp -b main.carp)
          sudo install -m 755 /tmp/carp-fmt/out/carp-fmt /usr/local/bin/

      - name: Lint
        run: |
          # SI-prefix multipliers (T, G, M, k, ...) intentionally use the
          # single-letter physics convention; angler's kebab-case rule
          # doesn't apply to this library.
          angler --disable non-kebab-case-defn $(find . -name '*.carp' \
            -not -path './out/*' \
            -not -path './docs/*' \
            -not -path './.carp-src/*' \
            -not -path './examples/*')

      - name: Format check
        run: |
          carp-fmt --check $(find . -name '*.carp' \
            -not -path './out/*' \
            -not -path './docs/*' \
            -not -path './.carp-src/*' \
            -not -path './examples/*')
